{% extends "base.html" %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-gray-800">📸 Gallery</h1>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-8">
        {% for i in range(8) %}
        <div class="gallery-item overflow-hidden rounded-lg shadow-md">
            <img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=400&q=80" alt="Safari Image" class="w-full h-48 object-cover gallery-img">
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
