{% extends "base.html" %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-gray-800">📝 Book Your Safari</h1>
    <div class="bg-white p-8 rounded-2xl shadow-lg mt-8">
        <form>
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 mb-2">Full Name</label>
                    <input type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Phone Number</label>
                    <input type="tel" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Tour Package</label>
                    <select class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                        {% for package in packages %}
                        <option value="{{ package.id }}">{{ package.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Number of Travelers</label>
                    <input type="number" min="1" value="1" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Travel Date</label>
                    <input type="date" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
                </div>
            </div>
            <div class="mt-4">
                <label class="block text-gray-700 mb-2">Additional Notes</label>
                <textarea rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]"></textarea>
            </div>
            <button class="w-full mt-6 bg-[#e67e22] text-white py-3 rounded-lg hover:bg-[#d35400] transition text-lg font-semibold">
                Book Now
            </button>
        </form>
    </div>
</section>
{% endblock %}
