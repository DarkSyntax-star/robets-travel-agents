{% extends "base.html" %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold text-center text-gray-800">📝 Register</h1>
        <form class="mt-6">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Username</label>
                <input type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Password</label>
                <input type="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-[#e67e22]">
            </div>
            <button class="w-full bg-[#e67e22] text-white py-3 rounded-lg hover:bg-[#d35400] transition">Register</button>
        </form>
        <p class="text-center mt-4">Already have an account? <a href="/login" class="text-[#e67e22] hover:underline">Login</a></p>
    </div>
</section>
{% endblock %}
