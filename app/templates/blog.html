{% extends "base.html" %}

{% block content %}
<section class="max-w-6xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-gray-800">📝 Travel Blog</h1>
    <div class="grid md:grid-cols-3 gap-6 mt-10">
        {% for i in range(6) %}
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden card-hover">
            <img src="https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=600&q=80" class="w-full h-48 object-cover">
            <div class="p-5">
                <h3 class="text-xl font-bold">Amazing Safari Adventures</h3>
                <p class="text-gray-600 text-sm mt-2">Discover the best safari experiences in East Africa...</p>
                <a href="#" class="text-[#e67e22] font-semibold mt-3 inline-block hover:underline">Read More →</a>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
