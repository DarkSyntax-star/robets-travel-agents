{% extends "base.html" %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-gray-800">🌍 All Tour Packages</h1>
    <div class="grid md:grid-cols-3 gap-8 mt-10">
        {% for package in packages %}
        <div class="bg-white rounded-3xl shadow-lg overflow-hidden card-hover">
            <img src="{{ package.image_url }}" alt="{{ package.name }}" class="w-full h-52 object-cover">
            <div class="p-5">
                <h3 class="text-xl font-bold text-gray-800">{{ package.name }}</h3>
                <p class="text-gray-500 text-sm">{{ package.destination }}</p>
                <p class="text-gray-600 text-sm mt-2">{{ package.description[:100] }}...</p>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-[#e67e22] font-bold text-xl">${{ package.price }}</span>
                    <span class="text-gray-400"><i class="far fa-clock"></i> {{ package.duration }}</span>
                </div>
                <a href="/booking" class="block text-center bg-[#e67e22] text-white py-2 rounded-full mt-3 hover:bg-[#d35400] transition">Book Now</a>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
