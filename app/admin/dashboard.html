{% extends "base.html" %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-gray-800">🛡️ Admin Dashboard</h1>
    <div class="grid md:grid-cols-2 gap-8 mt-8">
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-2xl font-bold">📦 Tour Packages</h2>
            <p class="text-3xl font-bold text-[#e67e22] mt-2">{{ packages|length }}</p>
            <p class="text-gray-600">Total Packages</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-2xl font-bold">📋 Bookings</h2>
            <p class="text-3xl font-bold text-[#e67e22] mt-2">{{ bookings|length }}</p>
            <p class="text-gray-600">Total Bookings</p>
        </div>
    </div>
</section>
{% endblock %}
